<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>我的奶油風旅遊地圖</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; background: #F9F7F2; color: #5D574F; font-family: sans-serif; display: flex; height: 100vh; flex-direction: column; }
        header { background: white; padding: 10px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .container { display: flex; flex: 1; overflow: hidden; }
        /* 左邊選單 */
        #sidebar { width: 280px; background: white; padding: 15px; overflow-y: auto; border-right: 1px solid #EEE; }
        /* 右邊地圖 */
        #map { flex: 1; background: #E8E4D9; }
        details { margin-bottom: 10px; }
        summary { cursor: pointer; font-weight: bold; color: #E6BAA3; padding: 5px; background: #FFF9F5; border-radius: 5px; }
        .item { padding: 5px 10px; font-size: 14px; display: flex; align-items: center; }
        .item input { margin-right: 8px; }
        .stats { font-weight: bold; margin-bottom: 15px; color: #E6BAA3; }
    </style>
</head>
<body>

<header><h1>我的奶油風足跡 🌍</h1></header>

<div class="container">
    <div id="sidebar">
        <div class="stats">已探索目的地：<span id="count">0</span></div>
        <div id="menu-content"></div>
    </div>
    <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // 目的地數據與座標
    const data = {
        "亞洲國家": { "日本": [36, 138], "韓國": [37, 127], "泰國": [13, 100], "新加坡": [1.3, 103], "越南": [14, 108] },
        "中國城市": { "北京": [39.9, 116.4], "上海": [31.2, 121.4], "廣州": [23.1, 113.2], "深圳": [22.5, 114], "成都": [30.6, 104], "杭州": [30.2, 120.1] },
        "歐洲": { "英國": [55, -3], "法國": [46, 2], "德國": [51, 9], "意大利": [41, 12], "瑞士": [46, 8] },
        "大洋洲": { "澳洲": [-25, 133], "新西蘭": [-40, 174] }
    };

    // 初始化地圖
    const map = L.map('map').setView([20, 0], 2);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution: '©OSM' }).addTo(map);

    let visited = JSON.parse(localStorage.getItem('travel_v2')) || [];
    let markers = {};

    // 建立選單
    const menu = document.getElementById('menu-content');
    for (const [zone, locs] of Object.entries(data)) {
        const det = document.createElement('details');
        det.innerHTML = <summary>${zone}</summary>;
        for (const loc in locs) {
            const div = document.createElement('div');
            div.className = 'item';
            const isChecked = visited.includes(loc) ? 'checked' : '';
            div.innerHTML = <input type="checkbox" id="${loc}" ${isChecked} onchange="toggle('${loc}')"><label for="${loc}">${loc}</label>;
            det.appendChild(div);
            if (visited.includes(loc)) addDot(loc);
        }
        menu.appendChild(det);
    }

    function toggle(name) {
        if (visited.includes(name)) {
            visited = visited.filter(n => n !== name);
            if(markers[name]) map.removeLayer(markers[name]);
        } else {
            visited.push(name);
            addDot(name);
        }
        localStorage.setItem('travel_v2', JSON.stringify(visited));
        document.getElementById('count').innerText = visited.length;
    }

    function addDot(name) {
        const categories = Object.values(data);
        let coords = null;
        categories.forEach(cat => { if(cat[name]) coords = cat[name]; });
        
        if (coords) {
            markers[name] = L.circleMarker(coords, {
                radius: 7, fillColor: "#E6BAA3", color: "#FFF", weight: 2, fillOpacity: 0.9
            }).addTo(map).bindPopup(name);
        }
    }
    document.getElementById('count').innerText = visited.length;
</script>
</body>
</html>
