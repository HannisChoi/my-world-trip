<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>My Travel Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; background: #F9F7F2; display: flex; height: 100vh; font-family: sans-serif; }
        #sidebar { width: 250px; background: white; padding: 20px; border-right: 1px solid #EEE; overflow-y: auto; }
        #map { flex: 1; }
        h2 { color: #E6BAA3; font-size: 1.2rem; }
        .item { margin: 10px 0; display: flex; align-items: center; }
        input { margin-right: 10px; accent-color: #E6BAA3; }
    </style>
</head>
<body>
    <div id="sidebar">
        <h2>已去過：<span id="cnt">0</span></h2>
        <div id="list"></div>
    </div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const places = {
            "北京": [39.9, 116.4], "上海": [31.2, 121.4], "廣州": [23.1, 113.2], "深圳": [22.5, 114.0],
            "日本": [36.2, 138.2], "韓國": [35.9, 127.7], "英國": [55.3, -3.4], "澳洲": [-25.2, 133.7]
        };
        const map = L.map('map').setView([20, 110], 3);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

        let visited = JSON.parse(localStorage.getItem('v1')) || [];
        const markers = {};

        const listDiv = document.getElementById('list');
        for (let name in places) {
            const div = document.createElement('div');
            div.className = 'item';
            const checked = visited.includes(name) ? 'checked' : '';
            div.innerHTML = <input type="checkbox" id="${name}" ${checked} onchange="upd('${name}')"><label>${name}</label>;
            listDiv.appendChild(div);
            if(visited.includes(name)) add(name);
        }

        function upd(name) {
            if(visited.includes(name)) {
                visited = visited.filter(n => n !== name);
                map.removeLayer(markers[name]);
            } else {
                visited.push(name);
                add(name);
            }
            localStorage.setItem('v1', JSON.stringify(visited));
            document.getElementById('cnt').innerText = visited.length;
        }

        function add(name) {
            markers[name] = L.circleMarker(places[name], {radius:8, fillColor:"#E6BAA3", color:"#FFF", weight:2, fillOpacity:0.9}).addTo(map);
        }
        document.getElementById('cnt').innerText = visited.length;
    </script>
</body>
</html>
